<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>🚦 Traffic Management - Login</title>\n    <link href=\"https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap\" rel=\"stylesheet\">\n    <style>\n        * { margin: 0; padding: 0; box-sizing: border-box; }\n        body {\n            font-family: 'Roboto', sans-serif;\n            background: linear-gradient(135deg, #1e1e1e, #0d0d0d);\n            min-height: 100vh;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n        }\n        .login-container {\n            background: linear-gradient(135deg, #2d2d2d, #1e1e1e);\n            border: 1px solid #3d3d3d;\n            border-radius: 12px;\n            padding: 40px;\n            width: 100%;\n            max-width: 400px;\n            box-shadow: 0 20px 60px rgba(0,0,0,0.8);\n        }\n        .login-header {\n            text-align: center;\n            margin-bottom: 30px;\n        }\n        .login-header h1 {\n            color: #2a9d8f;\n            font-size: 2.5rem;\n            margin-bottom: 10px;\n            text-shadow: 0 2px 8px rgba(42, 157, 143, 0.3);\n        }\n        .login-header p {\n            color: #888;\n            font-size: 0.95rem;\n        }\n        .form-group {\n            margin-bottom: 20px;\n        }\n        label {\n            display: block;\n            margin-bottom: 8px;\n            color: #ccc;\n            font-weight: 500;\n            font-size: 0.9rem;\n        }\n        input {\n            width: 100%;\n            padding: 12px;\n            background: #1e1e1e;\n            border: 1px solid #3d3d3d;\n            border-radius: 6px;\n            color: white;\n            font-size: 1rem;\n            transition: all 0.3s;\n        }\n        input:focus {\n            outline: none;\n            border-color: #2a9d8f;\n            background: #222;\n            box-shadow: 0 0 10px rgba(42, 157, 143, 0.2);\n        }\n        .btn-login {\n            width: 100%;\n            padding: 12px;\n            background: linear-gradient(135deg, #2a9d8f, #1a7f78);\n            color: white;\n            border: none;\n            border-radius: 6px;\n            font-size: 1rem;\n            font-weight: 600;\n            cursor: pointer;\n            transition: all 0.3s;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n        }\n        .btn-login:hover {\n            transform: translateY(-2px);\n            box-shadow: 0 8px 20px rgba(42, 157, 143, 0.4);\n        }\n        .error {\n            background: rgba(231, 111, 81, 0.1);\n            border: 1px solid #e76f51;\n            color: #e76f51;\n            padding: 12px;\n            border-radius: 6px;\n            margin-bottom: 20px;\n            text-align: center;\n            font-size: 0.9rem;\n        }\n        .demo-creds {\n            background: rgba(42, 157, 143, 0.1);\n            border: 1px solid #2a9d8f;\n            color: #2a9d8f;\n            padding: 15px;\n            border-radius: 6px;\n            margin-top: 20px;\n            font-size: 0.85rem;\n            text-align: center;\n        }\n        .demo-creds strong {\n            display: block;\n            margin-bottom: 5px;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"login-container\">\n        <div class=\"login-header\">\n            <h1>🚦</h1>\n            <h1>TRAFFIC AI</h1>\n            <p>Intelligent Traffic Management System</p>\n        </div>\n\n        <form method=\"POST\" onsubmit=\"submitLogin(event)\">\n            <div id=\"error\"></div>\n            \n            <div class=\"form-group\">\n                <label>👤 Username</label>\n                <input type=\"text\" name=\"username\" id=\"username\" required autocomplete=\"off\" placeholder=\"Enter username\">\n            </div>\n\n            <div class=\"form-group\">\n                <label>🔐 Password</label>\n                <input type=\"password\" name=\"password\" id=\"password\" required autocomplete=\"off\" placeholder=\"Enter password\">\n            </div>\n\n            <button type=\"submit\" class=\"btn-login\">🔓 Sign In</button>\n        </form>\n\n        <div class=\"demo-creds\">\n            <strong>Demo Credentials:</strong>\n            Username: <code>admin</code><br>\n            Password: <code>admin123</code>\n        </div>\n    </div>\n\n    <script>\n        async function submitLogin(e) {\n            e.preventDefault();\n            \n            const username = document.getElementById('username').value;\n            const password = document.getElementById('password').value;\n            const errorDiv = document.getElementById('error');\n            \n            try {\n                const res = await fetch('/login', {\n                    method: 'POST',\n                    headers: { 'Content-Type': 'application/json' },\n                    body: JSON.stringify({ username, password })\n                });\n                \n                if(res.ok) {\n                    window.location.href = '/';\n                } else {\n                    errorDiv.innerHTML = '<div class=\"error\">❌ Invalid credentials</div>';\n                }\n            } catch(e) {\n                errorDiv.innerHTML = '<div class=\"error\">❌ Error: ' + e.message + '</div>';\n                // Fallback: submit as form for traditional login\n                document.querySelector('form').submit();\n            }\n        }\n    </script>\n</body>\n</html>\n
