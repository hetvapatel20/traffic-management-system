<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #030508; color: #00f2ff;
            font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; margin: 0;
        }
        .login-box {
            background: rgba(10, 15, 20, 0.8); border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 40px; border-radius: 10px; width: 350px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); backdrop-filter: blur(10px);
        }
        h2 { margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5);
            border: 1px solid #333; color: white; border-radius: 4px; font-family: inherit;
        }
        input:focus { outline: none; border-color: #00f2ff; }
        button {
            width: 100%; padding: 12px; background: #00f2ff; color: black; border: none;
            font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: white; box-shadow: 0 0 15px #00f2ff; }
        .error { color: #ff2a2a; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>System Access</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Officer ID" required>
            <input type="password" name="password" placeholder="Passcode" required>
            <button type="submit">INITIALIZE CORE</button>
        </form>
        {% if error %} <div class="error">{{ error }}</div> {% endif %}
    </div>
</body>
</html>
